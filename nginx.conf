# Nginx configuration for Angular SPA

events {
    # Maximum simultaneous connections per worker process
    worker_connections 1024;
}

http {
    # Include MIME types (tells browser what kind of file it's receiving)
    # Without this: .js files sent as text/plain → browser won't execute them
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── GZIP Compression ──────────────────────────────────────────────────
    # Compress files before sending to browser
    # Reduces file sizes by ~70%: 500KB JS → 150KB
    # Browser decompresses automatically
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;    # Only compress files larger than 1KB
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    server {
        listen 80;
        server_name _;       # _ means "accept any domain"

        # Where your static files are stored (matches COPY destination above)
        root /usr/share/nginx/html;
        index index.html;

        # ── Angular SPA Routing (CRITICAL) ────────────────────────────────
        # Problem: Angular routes (/chat, /login) aren't real files on disk
        # When user visits /chat directly:
        #   Without this: Nginx looks for /chat file → 404 ❌
        #   With this:    Nginx serves index.html → Angular Router handles /chat ✅
        location / {
            try_files $uri $uri/ /index.html;
            # try_files checks these in order:
            # 1. $uri = exact file (/login.html) → if exists, serve it
            # 2. $uri/ = directory index → if exists, serve it
            # 3. /index.html = fallback → Angular Router takes over
        }

        # ── Cache Static Assets ────────────────────────────────────────────
        # Angular adds hash to filenames: main.abc123.js
        # Hash changes when code changes
        # Same hash = same content → safe to cache for 1 year
        location ~* \.(js|css|png|jpg|ico|woff2|woff|ttf|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # immutable = browser never re-checks this file
            # Result: instant loads for returning users ✅
        }

        # ── Security Headers ───────────────────────────────────────────────
        # Basic security: tell browser to be strict about what it runs
        add_header X-Frame-Options "SAMEORIGIN";
        # Prevents your site from being embedded in iframes (clickjacking protection)

        add_header X-Content-Type-Options "nosniff";
        # Browser must respect Content-Type header
        # Prevents MIME type confusion attacks

        add_header X-XSS-Protection "1; mode=block";
        # Old XSS filter — still useful for older browsers
    }
}
